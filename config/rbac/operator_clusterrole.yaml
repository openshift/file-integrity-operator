apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: file-integrity-operator
rules:
  - apiGroups:
      - ""
    resources:
      - nodes  # We need to list the nodes to be able to selectively scan
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - scheduling.k8s.io
    resources:
      - priorityclasses
    verbs:
      - get
      - list
      - watch
